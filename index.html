<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collecte des devoirs HTML/CSS</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            text-align: center;
            padding: 40px 20px;
            margin: 0;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h1 { color: #1a1a1a; font-size: 24px; margin-bottom: 10px; }
        p { color: #666; font-size: 15px; line-height: 1.5; margin-bottom: 30px; }
        
        /* Style du bouton */
        .btn-depot {
            display: inline-block;
            background-color: #4285f4; /* Bleu Google */
            color: white;
            text-decoration: none;
            padding: 15px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            transition: background 0.3s ease, transform 0.2s ease;
            box-shadow: 0 4px 6px rgba(66, 133, 244, 0.3);
        }
        .btn-depot:hover {
            background-color: #357ae8;
            transform: translateY(-2px);
        }
        .btn-depot:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Devoir HTML-CSS</h1>
        <p>Pour déposer votre  <strong>devoir HTML</strong> , cliquez sur le bouton bleu ci-dessous. Vous serez redirigé vers l'espace  dépôt.</p>
        
        <!-- REMPLACEZ LE LIEN CI-DESSOUS PAR VOTRE LIEN GOOGLE FORM COPIÉ -->
        <a href="https://forms.gle/vanw63KjmqBXv4VSA" target="_blank" class="btn-depot">
            Déposer votre Devoir ici
        </a>
    </div>

</body>
</html>
